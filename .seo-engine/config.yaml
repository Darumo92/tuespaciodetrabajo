project:
  name: "Tu Espacio de Trabajo"
  tagline: "Guías y comparativas de home office para teletrabajadores"
  website: "https://tuespaciodetrabajo.com"
  language: "es"
  target_audience: "Teletrabajadores en España que buscan mejorar su espacio de trabajo"
  categories:
    - sillas
